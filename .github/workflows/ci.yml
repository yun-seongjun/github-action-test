name: Selective Build

on:
  pull_request:
    branches:
      - main
      - dev
      - staging

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set NX SHAs
        run: |
          echo "NX_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: 'yarn'

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: |
            .nx/cache
            .nx/workspace-data
          key: nx-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Debug cache
        run: |
          echo "=== .nx directory structure ==="
          find .nx -type f 2>/dev/null | head -100 || echo "No .nx directory"
          echo "=== .nx/cache contents ==="
          ls -la .nx/cache 2>/dev/null || echo "No cache directory"

      - name: Build affected
        run: yarn nx affected -t build --verbose
name: Staging -> Main, Dev

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  APPS: "neubie-go neubie-order neubie-order-admin"

jobs:
  staging-to-main-and-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging
        uses: actions/checkout@v5
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1

      - name: Promote RC app versions to stable and update staging branch
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          CHANGED_APPS=""
          VERSIONS_LIST=""
          TITLE_SHORT=""
          FIRST_APP=""
          FIRST_VERSION=""
          COUNT=0

          # 모든 대상 앱에 대해 RC → stable 변환 수행
          for APP in ${{ env.APPS }}; do
            PACKAGE="apps/$APP/package.json"
            [ -f "$PACKAGE" ] || continue

            CURRENT_VERSION="$(node -p "require('./${PACKAGE}').version")"
            [ -n "$CURRENT_VERSION" ] || continue

            # x.y.z-rc.n -> x.y.z 로 변환
            NEW="${CURRENT_VERSION%-rc.*}"

            if [ -n "$NEW" ] && [ "$NEW" != "$CURRENT_VERSION" ]; then
              node -e "
                const fs=require('fs'); const path='${PACKAGE}';
                const package=JSON.parse(fs.readFileSync(path,'utf8'));
                package.version='${NEW}';
                fs.writeFileSync(path, JSON.stringify(package, null, 2)+'\n');
              "
              echo "write: $APP ${CURRENT_VERSION} -> ${NEW}"

              CHANGED_APPS="$CHANGED_APPS $APP"

              # PR 제목을 위해 첫번쨰 app
              if [ -z "$FIRST_APP" ]; then
                FIRST_APP="$APP"
                FIRST_VERSION="$NEW"
              fi

              if [ -z "$VERSIONS_LIST" ]; then
                VERSIONS_LIST="\`${APP}@${NEW}\`"
              else
                VERSIONS_LIST="${VERSIONS_LIST}, \`${APP}@${NEW}\`"
              fi

              COUNT=$((COUNT+1))
            else
              echo "keep:  $APP ${CURRENT_VERSION}"
            fi
          done

          # package.json에 변동이 있을경우에만 staging에 커밋 + 원격 staging 재생성
          # -n > 빈 문자열이면 false, 아니면  true
          # --porcelain > 파싱하기 좋은 포맷으로 출력
          # apps/*/package.json 중에 git에 변경된게 있는지 확인
          if [ -n "$(git status --porcelain apps/*/package.json)" ]; then
            git config user.name "GitHub Actions"
            git config user.email "github-actions@github.com"

            git add apps/*/package.json
            git commit -m "release: RC to stable"

            git push origin :staging
            git push -u origin staging
          fi

          # xargs 한줄 공백 구분 문자열 변환
          CHANGED_APPS="$(echo "$CHANGED_APPS" | xargs)"

          echo "head=staging" >> "$GITHUB_OUTPUT"
          echo "changed_apps=$CHANGED_APPS" >> "$GITHUB_OUTPUT"

          # -eq: "==", -ne: "!=", -gt: ">", -ge: ">=", -lt: "<", -le: "<="
          if [ "$COUNT" -gt 0 ]; then
            if [ "$COUNT" -eq 1 ]; then
              TITLE_SHORT="\`${FIRST_APP}@${FIRST_VERSION}\`"
            else
              REMAIN=$((COUNT - 1))
              TITLE_SHORT="\`${FIRST_APP}@${FIRST_VERSION}\` +${REMAIN} others"
            fi
            echo "versions_list=$VERSIONS_LIST" >> "$GITHUB_OUTPUT"
            echo "title_short=$TITLE_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR to main & dev
        if: steps.prep.outputs.changed_apps != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ steps.prep.outputs.head }}
          TITLE_SHORT: ${{ steps.prep.outputs.title_short }}
          VERSIONS_LIST: ${{ steps.prep.outputs.versions_list }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          create_pr() {
            local BASE_BRANCH="$1" TITLE_PREFIX="$2"

            git fetch origin "$BASE_BRANCH" "$HEAD_REF"

            local TITLE BODY
            TITLE="${TITLE_PREFIX} ${TITLE_SHORT}"
            BODY="${TITLE_PREFIX} ${VERSIONS_LIST}"

            gh pr create --repo "$REPO" --base "$BASE_BRANCH" --head "$HEAD_REF" --title "$TITLE" --body  "$BODY"
          }

          create_pr "main" "🚀 Release:"
          create_pr "dev"  "🔀 Staging -> Dev:"

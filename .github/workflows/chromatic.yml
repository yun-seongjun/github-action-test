# Chromatic 배포 워크플로우
# - main/dev 브랜치에 push 시 실행
# - libs/design-system 변경 시에만 트리거
# - TurboSnap으로 변경된 스토리만 스냅샷 촬영 (비용 절감)
name: Chromatic Deployment

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'libs/design-system/**'

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # fetch-depth: 0 = 전체 git 히스토리를 가져옴
          # Chromatic이 이전 빌드와 비교하기 위해 git 히스토리가 필요
          fetch-depth: 0

      # Node.js 버전은 .nvmrc 파일에서 관리
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          # cache: 'yarn' = yarn 의존성을 캐싱하여 설치 시간 단축
          # node_modules를 매번 다시 설치하지 않아 CI 시간 절약
          cache: 'yarn'
      - name: Install dependencies
        # --frozen-lockfile: yarn.lock 파일을 수정하지 않고 그대로 사용
        # CI 환경에서는 lock 파일이 변경되면 안 되므로 필수 옵션
        run: yarn install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: libs/design-system
          buildScriptName: storybook:build
          # exitOnceUploaded: 업로드 완료 후 즉시 종료
          # true = 시각적 테스트 결과를 기다리지 않고 CI 통과
          # false = 모든 시각적 테스트가 승인될 때까지 대기 (CI 블로킹)
          exitOnceUploaded: true
          # onlyChanged: 변경된 스토리만 스냅샷 촬영
          # true = 빌드 시간 단축, 비용 절감
          # TurboSnap 기능으로 git diff를 분석하여 영향받는 스토리만 테스트
          onlyChanged: true
          # externals: 외부 파일 변경 감지 경로
          # public 폴더의 이미지/폰트 등이 변경되면 관련 스토리 재촬영
          externals: 'public/**'
# Dev → Staging 릴리스 워크플로우
# - dev 브랜치 기준으로 staging 브랜치 생성 (기존 staging 삭제 후 재생성)
# - 선택한 버전 레벨(patch/minor/major)로 버전업 + rc.1 태그 부착
# - auto: Nx affected로 변경된 앱 자동 감지 (libs 의존성 포함)
# - 특정 앱 선택: 해당 앱 무조건 버전업
# - 공통 설정만 변경 시: 버전 없이 staging만 생성 (필요시 수동 선택)
name: Dev -> Staging

on:
  workflow_dispatch:
    inputs:
      new_level:
        description: "업데이트 할 버전 유형을 선택하세요"
        type: choice
        required: true
        default: minor
        options:
          - patch   # x.x.1 → x.x.2
          - minor   # x.1.x → x.2.0
          - major   # 1.x.x → 2.0.0
      apps:
        description: "적용할 앱을 선택하세요"
        type: choice
        required: true
        default: auto
        options:
          - auto    # Nx affected로 자동 감지
          - neubie-go
          - neubie-order
          - neubie-order-admin

# staging 브랜치 생성/삭제 및 커밋을 위해 write 권한 필요
permissions:
  contents: write

jobs:
  create-staging:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 - Nx affected 비교를 위해 전체 git 히스토리 필요
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0

      # Node.js 버전은 .nvmrc 파일에서 관리
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      # Nx 명령 실행을 위해 의존성 설치 필요
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Nx가 main과 현재 HEAD를 비교하여 변경된 프로젝트 감지
      - name: Set NX SHAs
        run: |
          git fetch origin main
          echo "NX_BASE=origin/main" >> $GITHUB_ENV
          echo "NX_HEAD=HEAD" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      # 기존 staging 삭제 후 dev 기준으로 새로 생성
      - name: Recreate clean staging branch from dev
        shell: bash
        run: |
          set -euo pipefail

          # 로컬 staging 브랜치를 origin/dev 기준으로 맞추기
          git checkout -B staging origin/dev

          # 원격 staging 브랜치 삭제
          git push origin --delete staging || true

      # auto: Nx affected로 감지, 특정 앱: 선택한 앱 사용
      - name: Resolve target apps from changes
        id: diff
        shell: bash
        env:
          TARGET_APP: ${{ inputs.apps }}
        run: |
          set -euo pipefail

          if [[ "$TARGET_APP" == "auto" ]]; then
            # Nx affected로 변경된 프로젝트 감지 (libs 의존성 포함)
            # --type=app 으로 앱만 필터링
            AFFECTED=$(yarn nx show projects --affected --type=app 2>/dev/null || echo "")

            # 줄바꿈을 공백으로 변환
            TARGETS=$(echo "$AFFECTED" | xargs)
          else
            TARGETS="$TARGET_APP"
          fi

          echo "apps=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "::notice::Affected apps: $TARGETS"

      # 감지된 앱의 package.json 버전을 {new_level}-rc.1로 업데이트
      - name: Update app package versions to next RC
        if: ${{ steps.diff.outputs.apps != '' }}
        shell: bash
        env:
          NEW_LEVEL: ${{ inputs.new_level }}
        run: |
          set -euo pipefail

          APPS="${{ steps.diff.outputs.apps }}"

          # 버전 변경 함수 (하단 반복문에서 사용)
          new_version () {
            # 함수에서만 쓸 변수 선언 ($1, $2는 첫번째 인자, 두번쨰 인자)
            local VERSION="$1" LEVEL="$2" MAJOR MINOR PATCH
            # "."으로 버전 분리 후 각 변수에 할당 ( "<<<" 은 문자열 표준 입력 )
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            # 값이 비어있으면 기본값 0 세팅
            MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
            case "$LEVEL" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch|*) PATCH=$((PATCH+1)) ;;
            esac
            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          for APP in $APPS; do
            PACKAGE="apps/$APP/package.json"
            [ -f "$PACKAGE" ] || continue

            # 현재 버전 base version 가져오기
            BASE=$(node -p "require('./$PACKAGE').version")
            # new_version 함수를 첫번쨰 인자와 두번쨰 인자 포함하여 실행
            NEW_BASE=$(new_version "$BASE" "$NEW_LEVEL")

            # dev to staging은 버전당 한 번만이라고 가정 → 항상 rc.1
            NEW="${NEW_BASE}-rc.1"

            node -e "
              const fs = require('fs');
              const path = '$PACKAGE';
              const package = JSON.parse(fs.readFileSync(path, 'utf8'));
              package.version = '$NEW';
              fs.writeFileSync(path, JSON.stringify(package, null, 2) + '\n');
            "

            git add "$PACKAGE"
            git commit -m "🚀 [$APP] ${BASE} → ${NEW}"
          done

      - name: Push staging branch
        run: |
          git push -u origin HEAD:staging
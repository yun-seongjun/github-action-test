name: Dev -> Staging

on:
  workflow_dispatch:
    inputs:
      new_level:
        description: "업데이트 할 버전 유형을 선택하세요"
        type: choice
        required: true
        default: minor
        options:
          - patch
          - minor
          - major
      apps:
        description: "적용할 앱을 선택하세요"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - neubie-go
          - neubie-order
          - neubie-order-admin

permissions:
  contents: write

env:
  APPS: "neubie-go neubie-order neubie-order-admin"

jobs:
  create-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Recreate clean staging branch from dev
        shell: bash
        run: |
          set -euo pipefail

          # origin/dev 최신 가져오기
          git fetch origin dev

          # 로컬 staging 브랜치를 origin/dev 기준으로 맞추기
          git checkout -B staging origin/dev

          # 원격 staging 브랜치 삭제
          git push origin --delete staging || true

      - name: Resolve target apps from changes
        id: diff
        shell: bash
        env:
          TARGET_APP: ${{ inputs.apps }}
        run: |
          set -euo pipefail

          # main 최신 가져오기 (dev와 변경점 체크위해)
          git fetch origin main

          TARGETS=""

          if [[ "$TARGET_APP" == "auto" ]]; then
            TARGETAPPS=""
            CHANGED_FILES=$(git diff --name-only origin/main..HEAD)

            for FILE in $CHANGED_FILES; do
              # apps/*/* 패턴 필터링
              if [[ "$FILE" == apps/*/* ]]; then
                # "apps/" 제거 (${변수#패턴} 은 앞에서부터 패턴에 매칭되는 부분 제거. #은 짧게 매칭, ##은 길게 매칭)
                APP="${FILE#apps/}"
                # 첫 "/" 이후 제거 (${변수%패턴} 은 뒤에서부터 매칭되는것 제거. %는 짧게 매칭 %%은 길게 매칭)
                APP="${APP%%/*}"
                TARGETAPPS="$TARGETAPPS $APP"
              fi
            done

            # "$TARGETAPPS" 공백 기준으로 쪼개기 > 정렬 및 중복 제거 > 한줄 공백 구분 문자열 변환
            TARGETS="$(echo "$TARGETAPPS" | xargs -n1 | sort -u | xargs)"
          else
            TARGETS="$TARGET_APP"
          fi

          # "apps=$TARGETS" 문자열 생성하여 "$GITHUB_OUTPUT" 파일 끝에 추가
          echo "apps=$TARGETS" >> "$GITHUB_OUTPUT"

      - name: Update app package versions to next RC
        if: ${{ steps.diff.outputs.apps != '' }}
        # bash 문법 사용하고있어 러너 변경 대비
        shell: bash
        env:
          NEW_LEVEL: ${{ inputs.new_level }}
        run: |
          set -euo pipefail

          APPS="${{ steps.diff.outputs.apps }}"

          # 버전 변경 함수 (하단 반복문에서 사용)
          new_version () {
            # 함수에서만 쓸 변수 선언 ($1, $2는 첫번째 인자, 두번쨰 인자)
            local VERSION="$1" LEVEL="$2" MAJOR MINOR PATCH
            # "."으로 버전 분리 후 각 변수에 할당 ( "<<<" 은 문자열 표준 입력 )
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            # 값이 비어있으면 기본값 0 세팅
            MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
            case "$LEVEL" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch|*) PATCH=$((PATCH+1)) ;;
            esac
            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          for APP in $APPS; do
            PACKAGE="apps/$APP/package.json"
            [ -f "$PACKAGE" ] || continue

            # 현재 버전 base version 가져오기
            BASE=$(node -p "require('./$PACKAGE').version")
            # new_version 함수를 첫번쨰 인자와 두번쨰 인자 포함하여 실행
            NEW_BASE=$(new_version "$BASE" "$NEW_LEVEL")

            # dev to staging은 버전당 한 번만이라고 가정 → 항상 rc.1
            NEW="${NEW_BASE}-rc.1"

            node -e "
              const fs = require('fs');
              const path = '$PACKAGE';
              const package = JSON.parse(fs.readFileSync(path, 'utf8'));
              package.version = '$NEW';
              fs.writeFileSync(path, JSON.stringify(package, null, 2) + '\n');
            "

            git add "$PACKAGE"
            git commit -m "🚀 [$APP] ${BASE} → ${NEW}"
          done

      - name: Push staging branch
        run: |
          git push -u origin HEAD:staging

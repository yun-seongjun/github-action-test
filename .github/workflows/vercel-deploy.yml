# Vercel 배포 워크플로우
# - main 브랜치: production 배포
# - staging 브랜치: preview 배포 + QA 테스트 트리거 + RC 버전 증가
# - Slack 알림 (성공/실패)
name: Deploy

on:
  workflow_dispatch:
    inputs:
      app:
        description: "배포할 앱을 선택하세요"
        required: true
        default: "NEUBIE_GO"
        type: choice
        options:
          - NEUBIE_GO
          - NEUBIE_ORDER
          - NEUBIE_ORDER_ADMIN

# staging 브랜치 push를 위해 write 권한 필요
permissions:
  contents: write

jobs:
  deploy:
    # main 또는 staging 브랜치에서만 실행
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      # 선택한 앱에 따라 Vercel 프로젝트 ID 설정
      VERCEL_PROJECT_ID: ${{ github.event.inputs.app == 'NEUBIE_GO' && secrets.VERCEL_PROJECT_ID_GO || github.event.inputs.app == 'NEUBIE_ORDER' && secrets.VERCEL_PROJECT_ID_ORDER || secrets.VERCEL_PROJECT_ID_ORDER_ADMIN }}

    steps:
      - uses: actions/checkout@v5

      # Node.js 버전은 .nvmrc 파일에서 관리
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      # 선택한 앱에 따라 앱 이름과 경로 설정
      - name: Resolve app name and path from workflow input
        run: |
          if [[ "${{ github.event.inputs.app }}" == "NEUBIE_GO" ]]; then
            echo "APP_NAME=뉴비고" >> $GITHUB_ENV
            echo "APP_PATH=apps/neubie-go" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.app }}" == "NEUBIE_ORDER" ]]; then
            echo "APP_NAME=뉴비오더" >> $GITHUB_ENV
            echo "APP_PATH=apps/neubie-order" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.app }}" == "NEUBIE_ORDER_ADMIN" ]]; then
            echo "APP_NAME=뉴비오더 어드민" >> $GITHUB_ENV
            echo "APP_PATH=apps/neubie-order-admin" >> $GITHUB_ENV
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # main: production 환경, staging: preview 환경
      - name: Pull Vercel Environment Information
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --git-branch=staging --token=${{ secrets.VERCEL_TOKEN }}
          fi

      # main: production 빌드, staging: preview 빌드
      - name: Build Project Artifacts
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            vercel build --prod
          else
            vercel build
          fi

      # main: production 배포, staging: preview 배포
      - name: Deploy Project Artifacts to Vercel
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi

      # 배포 결과 Slack 알림 (성공/실패 모두)
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || job.status == 'failure' && 'danger' || 'warning' }}
          SLACK_CUSTOM_PAYLOAD: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 프론트엔드 배포 완료 알림*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "앱: *${{ env.APP_NAME }}*\n배포 환경: *${{ github.ref_name }}*\n배포 결과: *${{ job.status == 'success' && '성공' || '실패' }}*"
                  }
                }
              ]
            }

      # staging 배포 성공 시 QA 테스트 트리거
      - name: Trigger QA Test Workflow
        if: success() && github.ref_name == 'staging'
        uses: ./.github/actions/trigger-qa-test
        with:
          jenkins_url: ${{ secrets.JENKINS_URL }}
          jenkins_user: ${{ secrets.JENKINS_USER }}
          jenkins_token: ${{ secrets.JENKINS_TOKEN }}

      # staging 배포 성공 시 RC 버전 증가 (rc.1 → rc.2)
      - name: Bump staging RC version from previous staging and recreate branch
        # 지금까지 스탭이 성공이고, staging일 경우에만 실행
        if: success() && github.ref_name == 'staging'
        run: |
          set -euo pipefail

          APP_PATH="${{ env.APP_PATH }}"
          PACKAGE_JSON="${APP_PATH}/package.json"

          # origin/staging 기준으로 로컬 임시 브랜치("staging_version_base") 생성 후 현재 버전 읽기
          git fetch origin staging
          git checkout -B staging_version_base origin/staging || {
            # orgin/staging을 불러오지못하면 종료(rc버전을 찾을수 없기때문에)
            echo "❌ origin/staging not found. Cannot read RC version."
            exit 1
          }
          CURRENT_VERSION=$(node -p "require('./${PACKAGE_JSON}').version")

          # base(-rc.N) 형태로 파싱 후 rc버전 증가
          BASE_VERSION="$CURRENT_VERSION"
          RC_NUMBER=0

          # "-rc." 가 붙어 있으면 rc 번호와 base 잘라내기
          if [[ "$CURRENT_VERSION" == *-rc.* ]]; then
            # ${변수%패턴} 은 뒤에서부터 매칭되는것 제거. %는 짧게 매칭 %%은 길게 매칭
            BASE_VERSION="${CURRENT_VERSION%-rc.*}"
            # ${변수#패턴} 은 앞에서부터 패턴에 매칭되는 부분 제거. #은 짧게 매칭, ##은 길게 매칭
            RC_NUMBER="${CURRENT_VERSION##*-rc.}"
          fi

          NEXT_RC_NUMBER=$((RC_NUMBER+1))
          NEW_VERSION="${BASE_VERSION}-rc.${NEXT_RC_NUMBER}"

          # staging 기준으로 staging 브랜치 재생성 후 NEW_VERSION 반영
          git checkout -B staging origin/staging

          node -e "
            const fs = require('fs');
            const path = '${PACKAGE_JSON}';
            const package = JSON.parse(fs.readFileSync(path, 'utf8'));
            package.version = '${NEW_VERSION}';
            fs.writeFileSync(path, JSON.stringify(package, null, 2) + '\n');
            "

          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          git add "$PACKAGE_JSON"
          git commit -m "🚀 [${APP_PATH#apps/}] ${CURRENT_VERSION} → ${NEW_VERSION}" || echo "No changes to commit"

          # 원격 staging 삭제 후 새 staging 푸시
          git push origin --delete staging || true
          git push -u origin staging
